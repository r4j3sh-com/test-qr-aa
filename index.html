<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b3d91" />
<title>Aadhaar QR Scanner</title>
<link rel="manifest" href="manifest.json" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
  :root { --brand:#0b3d91; --brand2:#1565c0; --bg:#f4f6fb; --card:#fff; --ok:#1b8a3a; --err:#c0392b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:#1a1a1a; }
  header { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#fff; padding:16px; text-align:center; }
  header h1 { margin:0; font-size:19px; font-weight:600; }
  header p { margin:4px 0 0; font-size:12px; opacity:.85; }
  main { padding:14px; max-width:520px; margin:0 auto; }
  .card { background:var(--card); border-radius:14px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); margin-bottom:14px; }
  #reader { width:100%; border-radius:12px; overflow:hidden; }
  button { width:100%; border:0; border-radius:12px; padding:14px; font-size:16px; font-weight:600; color:#fff; background:var(--brand2); margin-top:10px; }
  button.secondary { background:#607d8b; }
  button:active { opacity:.85; }
  .row { display:flex; gap:10px; }
  .row button { margin-top:0; }
  .hint { font-size:12px; color:#666; text-align:center; margin-top:8px; }
  .status { font-size:13px; padding:8px 12px; border-radius:8px; margin-top:10px; display:none; }
  .status.show { display:block; }
  .status.ok { background:#e5f6ea; color:var(--ok); }
  .status.err { background:#fdeceb; color:var(--err); }
  table { width:100%; border-collapse:collapse; }
  td { padding:9px 6px; border-bottom:1px solid #eee; font-size:14px; vertical-align:top; }
  td.k { color:#666; width:38%; font-weight:500; }
  td.v { color:#111; font-weight:600; word-break:break-word; }
  .photo { text-align:center; margin-bottom:12px; }
  .photo img { width:120px; height:150px; object-fit:cover; border-radius:10px; border:2px solid #e0e0e0; }
  .badge { display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; background:#eef2ff; color:var(--brand); margin-bottom:10px; }
  .hidden { display:none; }
  a.dl { display:inline-block; font-size:12px; margin-top:6px; color:var(--brand2); }
  footer { text-align:center; font-size:11px; color:#999; padding:16px; }
</style>
</head>
<body>
<header>
  <h1>Aadhaar QR Scanner</h1>
  <p>Scan the Secure QR on an Aadhaar card / e-Aadhaar</p>
</header>

<main>
  <div class="card">
    <div id="reader"></div>
    <div class="row">
      <button id="startBtn">Start camera</button>
      <button id="stopBtn" class="secondary hidden">Stop</button>
    </div>
    <div class="hint">Point at the square QR code. Allow camera access when prompted.</div>
    <div id="status" class="status"></div>
  </div>

  <div id="result" class="card hidden">
    <span class="badge" id="fmtBadge"></span>
    <div class="photo hidden" id="photoWrap">
      <img id="photo" alt="photo" />
      <div><a class="dl" id="photoDl" download="aadhaar-photo">Download photo</a></div>
    </div>
    <table id="dataTable"></table>
    <button id="againBtn">Scan another</button>
  </div>
</main>

<footer>Runs locally in your browser. Data is not uploaded anywhere. Use only with the cardholder's consent.</footer>

<script>
const $ = id => document.getElementById(id);
let html5Qr = null;

function setStatus(msg, type) {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status show ' + (type||'');
}

/* ---------- Aadhaar decoders ---------- */

// Old-format QR = XML string
function decodeOldXml(text) {
  const attr = n => { const m = text.match(new RegExp(n + '="([^"]*)"')); return m ? m[1] : ''; };
  return {
    format: 'Old XML QR',
    data: {
      'Aadhaar (last 4)': (attr('uid') || '').slice(-4),
      'Name': attr('name'),
      'Gender': attr('gender'),
      'Year of birth': attr('yob') || attr('dob'),
      'Care of': attr('co'),
      'House': attr('house'),
      'Street': attr('street'),
      'Landmark': attr('lm'),
      'Locality': attr('loc'),
      'VTC': attr('vtc'),
      'Post office': attr('po'),
      'Sub district': attr('subdist'),
      'District': attr('dist'),
      'State': attr('state'),
      'Pincode': attr('pc')
    },
    photo: null
  };
}

// Secure QR = big decimal integer -> bytes -> gunzip -> delimited fields
function decodeSecureQr(bigIntStr) {
  let n = BigInt(bigIntStr);
  let hex = n.toString(16);
  if (hex.length % 2) hex = '0' + hex;
  const raw = new Uint8Array(hex.length / 2);
  for (let i = 0; i < raw.length; i++) raw[i] = parseInt(hex.substr(i * 2, 2), 16);

  const bytes = pako.ungzip(raw); // Uint8Array of decompressed data

  // delimiter positions (byte 255)
  const delim = [-1];
  for (let i = 0; i < bytes.length; i++) if (bytes[i] === 255) delim.push(i);

  const fields = ['emailMobileIndicator','referenceId','name','dob','gender','careof',
                  'district','landmark','house','location','pincode','postoffice',
                  'state','street','subdistrict','vtc'];
  const dec = new TextDecoder('utf-8');
  const f = {};
  for (let i = 0; i < fields.length; i++) {
    f[fields[i]] = dec.decode(bytes.slice(delim[i] + 1, delim[i + 1])).trim();
  }

  // trailing = signature(256) + optional email hash(32) + mobile hash(32)
  const ind = f.emailMobileIndicator;
  let hashBytes = 0;
  if (ind === '1' || ind === '2') hashBytes = 32;
  else if (ind === '3') hashBytes = 64;
  const photoStart = delim[fields.length] + 1;
  const photoEnd = bytes.length - 256 - hashBytes;
  let photo = null;
  if (photoEnd > photoStart) photo = bytes.slice(photoStart, photoEnd);

  const ref = f.referenceId || '';
  return {
    format: 'Secure QR (signed by UIDAI)',
    data: {
      'Aadhaar (last 4)': ref.slice(0, 4),
      'Name': f.name,
      'Date of birth': f.dob,
      'Gender': ({M:'Male',F:'Female',T:'Transgender'}[f.gender] || f.gender),
      'Care of': f.careof,
      'House': f.house,
      'Street': f.street,
      'Landmark': f.landmark,
      'Location': f.location,
      'VTC': f.vtc,
      'Post office': f.postoffice,
      'Sub district': f.subdistrict,
      'District': f.district,
      'State': f.state,
      'Pincode': f.pincode
    },
    photo: photo
  };
}

function renderResult(res) {
  $('fmtBadge').textContent = res.format;
  const tbl = $('dataTable');
  tbl.innerHTML = '';
  for (const [k, v] of Object.entries(res.data)) {
    if (!v) continue;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="k">${k}</td><td class="v">${escapeHtml(v)}</td>`;
    tbl.appendChild(tr);
  }

  const pw = $('photoWrap');
  if (res.photo && res.photo.length > 4) {
    // JPEG (FFD8) renders in browser; JPEG2000 (0000000C 6A50) does not -> offer download
    const isJpeg = res.photo[0] === 0xFF && res.photo[1] === 0xD8;
    const mime = isJpeg ? 'image/jpeg' : 'image/jp2';
    const blob = new Blob([res.photo], { type: mime });
    const url = URL.createObjectURL(blob);
    $('photoDl').href = url;
    $('photoDl').download = isJpeg ? 'aadhaar-photo.jpg' : 'aadhaar-photo.jp2';
    if (isJpeg) { $('photo').src = url; $('photo').style.display = ''; }
    else { $('photo').style.display = 'none'; }
    pw.classList.remove('hidden');
  } else {
    pw.classList.add('hidden');
  }

  $('result').classList.remove('hidden');
  $('result').scrollIntoView({ behavior: 'smooth' });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function handleScan(text) {
  try {
    let res;
    const t = text.trim();
    if (t.startsWith('<')) res = decodeOldXml(t);
    else if (/^\d+$/.test(t)) res = decodeSecureQr(t);
    else { setStatus('Not an Aadhaar QR code.', 'err'); return; }
    setStatus('Decoded successfully.', 'ok');
    renderResult(res);
    stopScan();
  } catch (e) {
    setStatus('Could not decode this QR. Make sure it is an Aadhaar Secure QR. (' + e.message + ')', 'err');
  }
}

/* ---------- camera control ---------- */

function startScan() {
  if (!html5Qr) html5Qr = new Html5Qrcode('reader');
  $('result').classList.add('hidden');
  setStatus('Starting camera…', '');
  html5Qr.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    decoded => handleScan(decoded),
    () => {}
  ).then(() => {
    setStatus('Scanning… align the QR inside the box.', '');
    $('startBtn').classList.add('hidden');
    $('stopBtn').classList.remove('hidden');
  }).catch(err => setStatus('Camera error: ' + err, 'err'));
}

function stopScan() {
  if (html5Qr && html5Qr.isScanning) {
    html5Qr.stop().then(() => html5Qr.clear()).catch(()=>{});
  }
  $('startBtn').classList.remove('hidden');
  $('stopBtn').classList.add('hidden');
}

$('startBtn').onclick = startScan;
$('stopBtn').onclick = () => { stopScan(); setStatus('Stopped.', ''); };
$('againBtn').onclick = () => { $('result').classList.add('hidden'); startScan(); };
</script>
</body>
</html>
